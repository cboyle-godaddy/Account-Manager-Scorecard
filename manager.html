<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager View — AM Scorecard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect width="32" height="32" rx="6" fill="#1a9e3f"/>
            <path d="M8 16a8 8 0 1 1 16 0 8 8 0 0 1-16 0zm8-5.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11z" fill="white"/>
            <circle cx="16" cy="16" r="2.5" fill="white"/>
          </svg>
          <span class="logo-brand">GoDaddy</span>
          <span class="logo-divider">|</span>
          <span class="logo-product">Business Care AM Scorecard</span>
        </div>
        <a href="index.html" class="back-link">
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
          All AMs
        </a>
      </div>
    </header>

    <div class="scorecard-subheader">
      <div class="scorecard-subheader-inner">
        <div class="am-identity">
          <div class="am-avatar" style="background:#7c3aed;">CB</div>
          <div>
            <h1 class="am-name">Christopher Boyle</h1>
            <span class="am-level-badge" style="background:#ede9fe;color:#5b21b6;">Manager View</span>
          </div>
        </div>
        <div class="period-controls">
          <label for="mgr-month-select" class="sr-only">Month</label>
          <select id="mgr-month-select" class="form-select form-select--compact"></select>
        </div>
      </div>
    </div>

    <main class="manager-main">

      <section class="section">
        <h2 class="section-title">Team Rollup <span class="section-title-note" id="rollup-month-label"></span></h2>
        <div class="rollup-tiles" id="rollup-tiles">
          <!-- Injected by JS -->
        </div>
      </section>

      <section class="section">
        <div class="manager-section-header">
          <h2 class="section-title" style="margin-bottom:0;">Team Performance</h2>
          <a href="upload.html" class="manager-upload-link">
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
            </svg>
            Upload Monthly Data
          </a>
        </div>
        <div class="table-wrapper" style="margin-top:14px;">
          <table class="summary-table manager-team-table" id="team-table">
            <thead>
              <tr>
                <th>Account Manager</th>
                <th>Level</th>
                <th>CA <small>≥300</small></th>
                <th>PC% <small>≥25%</small></th>
                <th>OC <small>≥25</small></th>
                <th>iGCR Rolling <small>≥$30k</small></th>
                <th>Portfolio GCR</th>
                <th>Overall</th>
              </tr>
            </thead>
            <tbody id="team-tbody">
              <!-- Injected by JS -->
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/manager.js"></script>
</body>
</html>
